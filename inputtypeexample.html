<!-- input types -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input type</title>
 </head>
 <body>
    <form>
        <h1> All input type example</h1>
         <label>Enter Name</label>
         <input type="text" placeholder="enter name"/><br><br>
         <label>Enter Email</label>
         <input type="email" placeholder="enter email"/><br><br>
         <label>Phone Number</label>
         <input type="number" placeholder="enter phone number"/><br><br>
         <label>Enter Password</label>
         <input type="password" placeholder="enter password"/><br><br>
         <label>Enter DOB</label>
         <input type="date"/><br><br>
         <label>Enter Month</label>
         <input type="month"/><br><br>
         <label>Enter Week</label>
         <input type="week"/><br><br>
         <label>Enter Time</label>
         <input type="time"/><br><br>
         <labe>Enter date and time</labe>
         <input type="datetime-local"/><br><br>
         <label>Enter Range</label>
         <input type="range"/><br><br>
         <label>Choose Cities :-</label>
         <input type="checkbox" checked>Pune
         <!-- checked use to select auto -->
         <input type="checkbox" >Mumbai
         <input type="checkbox" >Nagpure
         <input type="checkbox" >Nasik
         <br><br>

         <label>select Gender</label>
         <input type="radio" name="gender">Male
         <input type="radio" name="gender">Female
         <input type="radio" name="gender">Other
         <br><br>


         <!-- upload single file -->
          <label>upload file</label>
          <input type="file" /><br><br>
         <!-- upload multiple files -->
          <label>upload file</label>
          <input type="file"  multiple/><br><br>

          <label>select your fav colour</label>
          <input type="color" /><br><br>


          <label>select your fav dish</label>
          <select>
            <option>choose...</option>
            <option >puran poli</option>
            <option >paw bhaji</option>
            <option >dal bhat</option>
            <option >Puri bhaji</option>
          </select>
          <br><br>

          <label>Enter Address</label>
          <textarea rows="3" cols="30"></textarea><br><br>

          <input type="submit" value="submit">
          <input type="button" value="submit">
          <input type="reset" value="Reset">



    </form>
 </body>
 </html>
